<h2>Recent Outbox Activity</h2>
<table>
  <thead>
    <tr><th>ID</th><th>Campaign</th><th>Recipient</th><th>Status</th><th>Attempts</th><th>Updated</th></tr>
  </thead>
  <tbody>
    {% for row in outbox_rows %}
      <tr>
        <td><a href="{% url 'emailauto:outbox_detail' row.id %}">{{ row.id }}</a></td>
        <td>{{ row.campaign.name }}</td>
        <td>{{ row.recipient.email }}</td>
        <td>{{ row.status }}</td>
        <td>{{ row.attempt_count }}/{{ row.max_attempts }}</td>
        <td>{{ row.updated_at }}</td>
      </tr>
    {% empty %}
      <tr><td colspan="6">No outbox activity yet.</td></tr>
    {% endfor %}
  </tbody>
</table>
